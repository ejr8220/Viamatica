<div class="field">
  <label *ngIf="label">
    {{ label }}
    <span *ngIf="required" class="required-mark">*</span>
  </label>
  <div class="search-input-wrapper">
    <input
      pInputText
      type="text"
      [placeholder]="placeholder"
      [(ngModel)]="displayValue"
      [readonly]="true"
      [disabled]="disabled"
      class="input-display"
      (click)="openDialog()"
    />
    <button
      pButton
      type="button"
      [icon]="actionIcon"
      (click)="handleAction()"
      [disabled]="disabled"
      [class]="'search-input-action ' + actionButtonClass"
    ></button>
  </div>
</div>

<p-dialog
  [(visible)]="visible"
  [header]="dialogHeader"
  [modal]="true"
  [style]="{ width: 'min(56rem, 92vw)' }"
  [contentStyle]="{ padding: '1.25rem', overflow: 'hidden' }"
  [draggable]="false"
  [resizable]="false"
>
  <div class="dialog-content">
    <div class="search-box search-box-wrapper">
      <i class="pi pi-search search-box-icon"></i>
      <input
        pInputText
        type="text"
        [(ngModel)]="searchText"
        placeholder="Buscar..."
        class="w-full search-box-input"
      />
    </div>

    <p-table
      [value]="filteredData"
      [loading]="loading"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[5, 10, 20]"
      [(selection)]="dialogSelection"
      selectionMode="single"
      [scrollable]="true"
      scrollHeight="flex"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header">
        <tr>
          <th *ngFor="let col of columns">{{ col.header }}</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-item>
        <tr [pSelectableRow]="item">
          <td *ngFor="let col of columns">{{ item?.[col.field] }}</td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td [attr.colspan]="columns.length">No se encontraron resultados.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <ng-template pTemplate="footer">
    <div class="dialog-footer">
      <button pButton type="button" label="Cancelar" severity="secondary" (click)="cancelDialog()"></button>
      <button pButton type="button" label="Aceptar" icon="pi pi-check" (click)="confirmSelection()" [disabled]="!dialogSelection"></button>
    </div>
  </ng-template>
</p-dialog>
