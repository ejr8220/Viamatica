<div class="card">
  <p-table
    #dt
    [value]="data"
    [columns]="columns"
    [paginator]="paginator"
    [rows]="rows"
    [rowsPerPageOptions]="rowsPerPageOptions"
    [loading]="loading"
    [globalFilterFields]="globalFilterFields"
    [selectionMode]="selectionMode"
    [(selection)]="selectedRows"
    (onRowSelect)="onRowSelect($event)"
    (onRowUnselect)="onRowUnselect($event)"
    (selectionChange)="onSelectionChange($event)"
    styleClass="p-datatable-gridlines"
    [tableStyle]="{ 'min-width': '50rem' }"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
    [showCurrentPageReport]="true"
  >
    <ng-template pTemplate="caption">
      <div class="flex justify-content-between align-items-center">
        <div class="flex gap-2">
          <ng-content select="[caption-start]"></ng-content>
        </div>
        <div class="flex gap-2">
          <ng-content select="[caption-end]"></ng-content>
          <button
            pButton
            type="button"
            icon="pi pi-filter-slash"
            label="Limpiar"
            (click)="clearFilters()"
            class="p-button-outlined"
          ></button>
        </div>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th *ngFor="let col of columns" [pSortableColumn]="col.sortable ? col.field : ''" [style.width]="col.width">
          {{ col.header }}
          <p-sortIcon *ngIf="col.sortable" [field]="col.field"></p-sortIcon>
        </th>
        <th *ngIf="actions.length > 0" style="width: 150px">Acciones</th>
      </tr>
      <tr>
        <th *ngFor="let col of columns">
          <input
            *ngIf="col.filterable"
            pInputText
            type="text"
            [(ngModel)]="columnFilters[col.field]"
            (input)="onFilter($event, col.field)"
            [placeholder]="'Buscar ' + col.header"
            class="p-column-filter"
          />
        </th>
        <th *ngIf="actions.length > 0"></th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-row>
      <tr [pSelectableRow]="row">
        <td *ngFor="let col of columns">
          {{ col.pipe ? (row?.[col.field] | date: 'short') : row?.[col.field] }}
        </td>
        <td *ngIf="actions.length > 0">
          <div class="flex gap-2">
            <button
              *ngFor="let action of actions"
              [hidden]="!isActionVisible(action, row)"
              pButton
              type="button"
              [icon]="action.icon"
              [pTooltip]="action.tooltip"
              tooltipPosition="top"
              [class]="action.styleClass || 'p-button-rounded p-button-text'"
              (click)="executeAction(action, row, $event)"
            ></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td [attr.colspan]="columns.length + (actions.length > 0 ? 1 : 0)">
          No se encontraron registros.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
